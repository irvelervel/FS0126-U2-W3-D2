<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rubrica OOP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body style="background-color: #bebebe">
    <main>
      <div class="container">
        <div class="row justify-content-center mt-5">
          <div class="col-12 col-md-8">
            <h2 class="text-center">FORM CONTATTI</h2>
            <section>
              <form id="rubrica-form">
                <div class="mb-3">
                  <label for="firstName" class="form-label"
                    >Nome contatto</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="firstName"
                    placeholder="Mario"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="lastName" class="form-label"
                    >Cognome contatto</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="lastName"
                    placeholder="Rossi"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="phone" class="form-label"
                    >Telefono contatto</label
                  >
                  <input type="tel" class="form-control" id="phone" required />
                </div>
                <div>
                  <button class="btn btn-success" type="submit">SALVA</button>
                </div>
              </form>
            </section>
            <section>
              <div class="row mt-4 g-3" id="contacts">
                <!-- qui dentro non creo in HTML delle colonne, ma le farò direttamente da JS! -->
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./rubrica.js"></script>
  </body>
</html>
